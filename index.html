<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Vitae</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; }
        h1 { color: #333; }
        h2 { color: #666; }
        .container { max-width: 800px; margin: auto; padding: 20px; border: 1px solid #ccc; }
        .section { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Curriculum Vitae</h1>
        <div class="section">
            <h2>Personal Information</h2>
            <p><strong>Name:</strong> John Doe</p>
            <p><strong>Email:</strong> john.doe@example.com</p>
            <p><strong>Phone:</strong> (123) 456-7890</p>
        </div>
        <div class="section">
            <h2>Education</h2>
            <p><strong>B.Sc. in Computer Science</strong>, University of Example, 2020</p>
        </div>
        <div class="section">
            <h2>Work Experience</h2>
            <p><strong>Software Developer</strong>, Example Corp, 2020 - Present</p>
        </div>
        <div class="section">
            <h2>Skills</h2>
            <ul>
                <li>JavaScript</li>
                <li>HTML & CSS</li>
                <li>Python</li>
            </ul>
        </div>
    </div>
</body>
</html>
