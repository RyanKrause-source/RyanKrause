<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
    <title>Visual Overhaul</title>
    <style>
        body {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, indigo, pink);
            color: #fff;
            transition: background 0.5s;
            overflow: hidden;
        }

        .dark-mode {
            background: linear-gradient(135deg, cyan, emerald);
        }

        .floating-button {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 15px;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: background 0.3s;
        }

        .floating-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        .gradient-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(-20px, 20px);
            }
            100% {
                transform: translate(0, 0);
            }
        }

        .skill-bar {
            width: 80%;
            background: linear-gradient(to right, pink, amber);
            border-radius: 10px;
            position: relative;
            height: 20px;
            transition: width 0.5s;
        }

        .skill-bar::after {
            content: '';
            position: absolute;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
            width: 100%;
            border-radius: 10px;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200px 0;
            }
            100% {
                background-position: 200px 0;
            }
        }
    </style>
</head>
<body>
    <div class="gradient-blobs"></div>
    <div class="content">
        <h1>Welcome to My Website</h1>
        <button class="floating-button" onclick="toggleDarkMode()">Toggle Dark Mode</button>
        <div class="skills">
            <div class="skill-bar" style="width: 80%;"></div>
        </div>
    </div>
    <script>
        const toggleDarkMode = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode'));
        };

        window.onload = () => {
            if(localStorage.getItem('dark-mode') === 'true') {
                document.body.classList.add('dark-mode');
            }
        };
    </script>
</body>
</html>
